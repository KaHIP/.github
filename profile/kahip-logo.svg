<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffa726" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffa726" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" rx="16" fill="url(#bg)"/>

  <!-- Glows behind graph blocks -->
  <ellipse cx="140" cy="130" rx="110" ry="110" fill="url(#glow1)"/>
  <ellipse cx="300" cy="130" rx="100" ry="100" fill="url(#glow2)"/>
  <ellipse cx="220" cy="130" rx="90" ry="90" fill="url(#glow3)"/>

  <!-- Block 1 (red) - left cluster -->
  <!-- Edges within block 1 -->
  <line x1="95" y1="75" x2="135" y2="55" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <line x1="95" y1="75" x2="75" y2="120" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <line x1="135" y1="55" x2="155" y2="95" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <line x1="75" y1="120" x2="115" y2="140" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <line x1="155" y1="95" x2="115" y2="140" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <line x1="95" y1="75" x2="155" y2="95" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <line x1="95" y1="75" x2="115" y2="140" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <!-- Nodes block 1 -->
  <circle cx="95" cy="75" r="9" fill="#ef5350"/>
  <circle cx="135" cy="55" r="9" fill="#ef5350"/>
  <circle cx="75" cy="120" r="9" fill="#ef5350"/>
  <circle cx="155" cy="95" r="9" fill="#ef5350"/>
  <circle cx="115" cy="140" r="9" fill="#ef5350"/>

  <!-- Block 2 (blue) - middle cluster -->
  <!-- Edges within block 2 -->
  <line x1="210" y1="60" x2="240" y2="100" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
  <line x1="210" y1="60" x2="185" y2="110" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="100" x2="185" y2="110" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
  <line x1="240" y1="100" x2="220" y2="150" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
  <line x1="185" y1="110" x2="220" y2="150" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
  <!-- Nodes block 2 -->
  <circle cx="210" cy="60" r="9" fill="#42a5f5"/>
  <circle cx="240" cy="100" r="9" fill="#42a5f5"/>
  <circle cx="185" cy="110" r="9" fill="#42a5f5"/>
  <circle cx="220" cy="150" r="9" fill="#42a5f5"/>

  <!-- Block 3 (yellow/orange) - right cluster -->
  <!-- Edges within block 3 -->
  <line x1="310" y1="70" x2="340" y2="110" stroke="#ffa726" stroke-width="1.5" opacity="0.4"/>
  <line x1="310" y1="70" x2="285" y2="130" stroke="#ffa726" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="110" x2="285" y2="130" stroke="#ffa726" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="110" x2="320" y2="160" stroke="#ffa726" stroke-width="1.5" opacity="0.4"/>
  <line x1="285" y1="130" x2="320" y2="160" stroke="#ffa726" stroke-width="1.5" opacity="0.4"/>
  <!-- Nodes block 3 -->
  <circle cx="310" cy="70" r="9" fill="#ffa726"/>
  <circle cx="340" cy="110" r="9" fill="#ffa726"/>
  <circle cx="285" cy="130" r="9" fill="#ffa726"/>
  <circle cx="320" cy="160" r="9" fill="#ffa726"/>

  <!-- Cut edges (dashed, between blocks) -->
  <line x1="155" y1="95" x2="185" y2="110" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="135" y1="55" x2="210" y2="60" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="115" y1="140" x2="185" y2="110" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="240" y1="100" x2="285" y2="130" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="220" y1="150" x2="285" y2="130" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="210" y1="60" x2="310" y2="70" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Title -->
  <text x="480" y="105" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#e0e0e0" letter-spacing="2">
    <tspan fill="#ef5350">Ka</tspan><tspan fill="#e0e0e0">HIP</tspan>
  </text>

  <!-- Subtitle -->
  <text x="485" y="140" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#90a4ae" letter-spacing="1">
    High Quality Decomposition
  </text>

  <!-- Legend -->
  <circle cx="490" cy="185" r="5" fill="#ef5350"/>
  <text x="502" y="189" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">Block 1</text>
  <circle cx="570" cy="185" r="5" fill="#42a5f5"/>
  <text x="582" y="189" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">Block 2</text>
  <circle cx="650" cy="185" r="5" fill="#ffa726"/>
  <text x="662" y="189" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">Block 3</text>
  <line x1="730" y1="185" x2="750" y2="185" stroke="#90a4ae" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="758" y="189" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#a0a0a0">Cut edges</text>
</svg>
